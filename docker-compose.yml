services:
  app:
    build: .
    image: docker-t1-diary:latest
    container_name: diary-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATA_DIR: /app/data
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET 를 .env 에 설정하세요}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
